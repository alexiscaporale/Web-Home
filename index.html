<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solander 898</title>
    <style>
        body {
            font-family: "Times New Roman", Times, serif;
            background-color: #ffffff;
            color: #000000;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .language-switcher {
            position: absolute;
            top: 20px;
            right: 40px;
            font-size: 14px;
            font-weight: bold;
        }
        .language-switcher span { cursor: pointer; padding: 0 5px; color: #999; }
        .language-switcher span.active { color: #000; text-decoration: underline; }
        .container { width: 100%; max-width: 800px; margin-top: 50px; padding: 20px; }
        .header-logo-container { display: flex; align-items: center; justify-content: center; gap: 5px; margin-bottom: 5px; }
        .botanical-logo { width: 70px; height: 70px; background-image: url('solanderlogofondoblanco.png'); background-size: contain; background-repeat: no-repeat; background-position: center; }
        h1 { font-size: 32px; text-transform: uppercase; letter-spacing: 1px; margin: 0; font-weight: bold; }
        .address { font-size: 18px; margin-bottom: 20px; line-height: 1.4; padding-left: 15px; }
        hr { border: 0; border-top: 1px solid #e0e0e0; margin: 25px 0; width: 100%; }
        .links-grid { font-size: 15px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; text-align: left; }
        a { color: #0000FF; text-decoration: none; font-size: 16px; }
        a:hover { text-decoration: underline; }
        
        /* Lógica de idiomas */
        [lang="es"] { display: none !important; }
        body.lang-es [lang="es"] { display: block !important; }
        body.lang-es span[lang="es"] { display: inline !important; }
        body.lang-es [lang="en"] { display: none !important; }
        
        @media print { .language-switcher { display: none; } }
    </style>
</head>
<body class="lang-en">
    <div class="language-switcher">
        <span id="btn-en" class="active" onclick="setLanguage('en')">ENG</span>
        <span style="color: #ccc;">/</span>
        <span id="btn-es" onclick="setLanguage('es')">ES</span>
    </div>
    <div class="container">
        <div class="header-logo-container">
            <div class="botanical-logo"></div>
            <h1>SOLANDER 898</h1>
        </div>
        <div class="address">
           <span lang="en">Legacy preservation through value construction</span>
           <span lang="es">Preservación de patrimonio, construcción de valor</span>
        </div>
        <hr>
        </div>
    <script>
        function setLanguage(lang) {
            document.body.className = 'lang-' + lang;
            document.getElementById('btn-en').className = lang === 'en' ? 'active' : '';
            document.getElementById('btn-es').className = lang === 'es' ? 'active' : '';
        }
    </script>
</body>
</html>
