
  <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solander 898</title>
    <style>
        body {
            font-family: "Times New Roman", Times, serif;
            background-color: #ffffff;
            color: #000000;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        /* Menú de Idioma arriba a la derecha */
        .language-switcher {
            position: absolute;
            top: 20px;
            right: 40px;
            font-size: 14px;
            font-weight: bold;
        }
        .language-switcher span {
            cursor: pointer;
            padding: 0 5px;
            color: #999;
        }

        .language-switcher span.active {
            color: #000;
            text-decoration: underline;
        }

        .container {
            width: 100%;
            max-width: 800px;
            margin-top: 50px;
            padding: 20px;
        }

        /* --- Estilos del Nuevo Encabezado con Logo --- */
        .header-logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px; /* Espacio entre el logo y el texto */
            margin-bottom: 5px;
        }

        /* Recreando la imagen botánica en CSS con fondo transparente */
        .botanical-logo {
            width: 70px; /* Tamaño del logo */
            height: 70px;
            background-image: url('solanderlogofondoblanco.png'); /* Ruta a tu imagen */
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        h1 {
            font-size: 32px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0; /* Quitamos márgenes para alinearlo bien */
            font-weight: bold;
        }
        /* --------------------------------------------- */

        .address {
            font-size: 18px;
            margin-bottom: 20px;
            line-height: 1.4;
            padding-left: 15px;
        }

        hr {
            border: 0;
            border-top: 1px solid #e0e0e0;
            margin: 25px 0;
            width: 100%;
        }

        /* Rejilla de enlaces */
        .links-grid {
            font-size: 15px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            text-align: left;
        }

        a {
            color: #0000FF; /* Azul estándar de hipervínculo */
            text-decoration: none;
            font-size: 14px;
        }

        .link-disclaimer {
            color: #0000FF; /* Azul estándar de hipervínculo */
            text-decoration: none;
            font-size: 8px;
        }

        a:hover {
            text-decoration: underline;
        }

        /* Sección de texto informativo */
        .info-section {
            text-align: left;
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 30px;
        }
          .disclaimer {
            text-align: left;
            font-size: 8px;
            line-height: 1.5;
            margin-bottom: 30px;
        }
        .philosophy {
            text-align: left;
            font-size: 15px;
            line-height: 1;
            margin-bottom: 5px;
        }

        .info-title {
            font-weight: bold;
            text-align: left;
            display: block;
            margin-bottom: 10px;
        }

        .footer {
            font-size: 14px;
            margin-top: 40px;
            margin-bottom: 60px;
            color: #333;
        }

        /* Adaptación para móviles */
        @media (max-width: 600px) {
            .links-grid {
                grid-template-columns: 1fr;
                text-align: center;
            }
            .header-logo-container {
                flex-direction: column;
                gap: 5px;
            }
        }
        /* Control de visibilidad de idiomas */
/* --- Lógica de Idiomas Corregida --- */

/* Por defecto, el español está oculto */
[lang="es"] { 
    display: none !important; 
}

/* El inglés se muestra por defecto */
[lang="en"] { 
    display: inline-block; 
}

/* Ajuste para párrafos en inglés */
p[lang="en"], div[lang="en"] {
    display: block;
}

/* CUANDO SE ACTIVA EL ESPAÑOL: */
body.lang-es [lang="en"] { 
    display: none !important; 
}

body.lang-es [lang="es"] { 
    display: inline-block !important; 
}

body.lang-es p[lang="es"], body.lang-es div[lang="es"] {
    display: block !important;
}

        @media print {
            .language-switcher { display: none; }
            .container { margin-top: 20px; }
            a { color: #0000FF !important; }
        }

        @media (max-width: 600px) {
            .language-switcher { right: 20px; top: 10px; }
            .links-grid { grid-template-columns: 1fr; text-align: center; }
            .address { padding-left: 0; }
        }
    </style>
</head>
<body class="lang-en">
<div class="language-switcher no-print">
        <span id="btn-en" class="active" onclick="setLanguage('en')">ENG</span>
        <span style="color: #ccc;">/</span>
        <span id="btn-es" onclick="setLanguage('es')">ES</span>
    </div>
    <div class="container">
        <div class="header-logo-container">
            <div class="botanical-logo" title="Daniel Carl Solander Botanical Engraving"></div>
            <h1>SOLANDER 898</h1>
        </div>

        <div class="address">
           <span lang="en">Legacy preservation through value construction</span>
           <span lang="es">Preservación de patrimonio, construcción de valor</span>
        </div>

        <hr>
        <div class="footer">
        <span lang="en">   Copyright © 2026 898 Farnam St, LLC.<br>
            <a href="mailto:info@solander898.com">Contact Us</a> | <a href="/disclosures">Full Disclosures</a>
        </span> 
        <span lang="es">   Copyright © 2026 898 Farnam St, LLC.<br>
            <a href="mailto:info@solander898.com">Contacto</a> | <a href="/disclosures">Full Disclosures</a>
        </span> 
        </div>
    </div>
<script>
    function setLanguage(lang) {
        // 1. Quitamos las clases de idioma activas del body
        document.body.classList.remove('lang-en', 'lang-es');
        
        // 2. Añadimos la clase del idioma seleccionado
        document.body.classList.add('lang-' + lang);

        // 3. Actualizamos visualmente los botones del menú
        document.getElementById('btn-en').classList.remove('active');
        document.getElementById('btn-es').classList.remove('active');
        document.getElementById('btn-' + lang).classList.add('active');
    }
</script>
</body>
</html>
