<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Solander 898</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:       #0a0a0a;
            --border:   #222222;
            --border-2: #333333;
            --ink:      #f2f2f2;
            --ink-dim:  #999999;
            --ink-muted:#555555;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--ink);
            font-family: 'Inter', -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Nav ── */
        nav {
            padding: 1.5rem 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 14px;
            text-decoration: none;
            color: inherit;
        }

        .logo-mark {
            width: 36px;
            height: 36px;
            flex-shrink: 0;
        }

        .logo-name {
            font-family: 'JetBrains Mono', monospace;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--ink);
            text-transform: none;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 2rem;
        }

        nav a {
            color: var(--ink-dim);
            text-decoration: none;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            transition: color 0.2s;
        }

        nav a:hover { color: var(--ink); }

        /* ── Content ── */
        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 60px 40px 80px;
            flex: 1;
        }

        .section-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: var(--ink-muted);
            letter-spacing: 2.5px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        h2 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.3px;
            color: var(--ink);
            margin-bottom: 48px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .contact-email {
            font-size: 16px;
            margin-bottom: 40px;
        }

        .contact-email a {
            font-family: 'JetBrains Mono', monospace;
            color: var(--ink);
            text-decoration: none;
            border-bottom: 1px solid var(--border-2);
            padding-bottom: 2px;
            transition: border-color 0.2s;
        }

        .contact-email a:hover {
            border-bottom-color: #666;
        }

        .legal-info {
            font-size: 13px;
            color: var(--ink-dim);
            line-height: 1.9;
        }

        /* ── Footer ── */
        footer {
            padding: 1.5rem 2.5rem;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        footer p {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: var(--ink-muted);
            letter-spacing: 1px;
        }

        @media (max-width: 600px) {
            .container { padding: 40px 24px 60px; }
            nav { padding: 1.2rem 1.5rem; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo-area">
            <svg class="logo-mark" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="32" cy="32" r="30" stroke="#333" stroke-width="1.5" fill="#0a0a0a"/>
                <circle cx="32" cy="32" r="26" stroke="#222" stroke-width="0.5"/>
                <text x="32" y="32" text-anchor="middle" dominant-baseline="central" font-family="JetBrains Mono, Menlo, monospace" font-size="18" font-weight="700" fill="#f2f2f2" letter-spacing="-0.5">898</text>
            </svg>
            <span class="logo-name">Solander 898</span>
        </a>
        <ul>
            <li><a href="index.html">Inicio</a></li>
            <li><a href="filosofia.html">Filosofía</a></li>
        </ul>
    </nav>

    <div class="container">
        <h2>Contacto</h2>

        <p class="contact-email">
            <a href="mailto:contacto@solander898.com">contacto@solander898.com</a>
        </p>

        <p class="legal-info">
            898 Farnam St LLC<br>
            16192 Coastal Highway, Lewes, Delaware 19958, County of Sussex<br>
            Registered Agent: Harvard Business Services, Inc.
        </p>
    </div>

    <footer>
        <p>© 2026 Solander 898</p>
        <p>898 Farnam St LLC</p>
    </footer>

</body>
</html>
